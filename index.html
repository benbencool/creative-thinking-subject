<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行動版：跨領域連結性圖</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: '微軟正黑體', sans-serif;
            margin: 0; padding: 0;
            background-color: #2c3e50; /* 行動版使用深色背景更顯色 */
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            touch-action: none; 
            user-select: none;
        }

        /* 手機版頂部操作區 */
        #mobile-header {
            width: 100%;
            background: #ffffff;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }

        #noteText { grid-column: span 2; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        select { padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-add { background: #6cacc5; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; }
        .btn-del { width: 100%; grid-column: span 2; background: #e57373; color: white; border: none; border-radius: 5px; padding: 5px; font-size: 14px; margin-top: 5px; }

        /* 手機版畫布容器 - 強制寬度 100% */
        #stage {
            flex: 1;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 靠上對齊方便手指操作 */
            padding-top: 15px;
        }

        #canvas-mobile {
            position: relative;
            width: 1000px; /* 原始設計寬度 */
            height: 750px; /* 原始設計高度 */
            background-color: white;
            background-image: url('background.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            transform-origin: top center; /* 從頂部中心點縮放 */
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        /* 便利貼加大，適合手指觸控 */
        .note {
            position: absolute; width: 95px; height: 95px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-weight: bold; font-size: 16px;
            border-radius: 6px; box-shadow: 3px 5px 12px rgba(0,0,0,0.3);
            touch-action: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="mobile-header">
        <input type="text" id="noteText" placeholder="輸入想法 (如：符號學)">
        <select id="noteColor">
            <option value="#fcf4d9">黃色領域</option>
            <option value="#d9f2e6">綠色領域</option>
            <option value="#fce4ec">紅色主題</option>
        </select>
        <button class="btn-add" onclick="addNote()">➕ 生成便利貼</button>
        <button class="btn-del" onclick="reset()">🗑️ 清空所有</button>
    </div>

    <div id="stage">
        <div id="canvas-mobile"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-mobile');
        const stage = document.getElementById('stage');
        let scaleVal = 1;

        // --- 行動版強制滿寬縮放 ---
        function resizeForMobile() {
            const windowW = window.innerWidth;
            // 行動版一律以螢幕寬度為基準縮放 (100% 滿寬)
            scaleVal = windowW / 1000;
            canvas.style.transform = `scale(${scaleVal})`;
        }

        window.addEventListener('resize', resizeForMobile);
        resizeForMobile();

        function addNote() {
            const txt = document.getElementById('noteText').value || "想法";
            const col = document.getElementById('noteColor').value;
            const n = document.createElement('div');
            n.className = 'note';
            n.innerText = txt;
            n.style.backgroundColor = col;
            
            // 隨機在畫布中上方生成，防止被鍵盤或控制列擋住
            n.style.left = (300 + Math.random() * 400) + 'px';
            n.style.top = (200 + Math.random() * 100) + 'px';

            bindTouchEvents(n);
            canvas.appendChild(n);
            document.getElementById('noteText').value = "";
        }

        function reset() {
            if(confirm("確定清空嗎？")) document.querySelectorAll('.note').forEach(n => n.remove());
        }

        // --- 行動版觸控優化邏輯 ---
        function bindTouchEvents(el) {
            let active = false;
            let startX, startY, initL, initT;

            el.addEventListener('pointerdown', (e) => {
                active = true;
                el.style.zIndex = 1000;
                el.setPointerCapture(e.pointerId);
                
                startX = e.clientX;
                startY = e.clientY;
                initL = el.offsetLeft;
                initT = el.offsetTop;
            });

            el.addEventListener('pointermove', (e) => {
                if (!active) return;
                // 使用行動版當前的 scaleVal 校正手指位移
                let dx = (e.clientX - startX) / scaleVal;
                let dy = (e.clientY - startY) / scaleVal;
                el.style.left = (initL + dx) + 'px';
                el.style.top = (initT + dy) + 'px';
            });

            el.addEventListener('pointerup', (e) => {
                active = false;
                el.style.zIndex = 10;
                el.releasePointerCapture(e.pointerId);
            });
        }
    </script>
</body>
</html>
