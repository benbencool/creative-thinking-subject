<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全平台通用：跨領域連結性圖</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: '微軟正黑體', sans-serif;
            margin: 0; padding: 0;
            background-color: #f0f2f5;
            display: flex; flex-direction: column; align-items: center;
            /* 手機版允許上下捲動，電腦版則由縮放邏輯控制 */
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: pan-y;
            user-select: none;
        }

        /* 頂部操作區 - 響應式排版 */
        #ui-header {
            width: 100%;
            background: white; padding: 10px;
            display: flex; gap: 8px; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 100;
            flex-wrap: wrap; /* 手機自動換行 */
            justify-content: center;
        }

        .input-group { display: flex; gap: 5px; flex-grow: 1; max-width: 600px; }
        #noteText { flex: 2; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        #noteColor { flex: 1; padding: 10px; font-size: 16px; border-radius: 4px; }
        
        button { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .btn-add { background: #6cacc5; color: white; }
        .btn-del { background: #e57373; color: white; }

        /* 核心包裝層：用來處理縮放 */
        #stage {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
        }

        #canvas-box {
            position: relative;
            /* 以直向圖比例為基準：寬 800, 高 1100 */
            width: 800px; 
            height: 1100px;
            background-color: white;
            background-image: url('background.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            transform-origin: top center;
        }

        /* 便利貼樣式 */
        .note {
            position: absolute; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-weight: bold; font-size: 16px;
            border-radius: 5px; box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            cursor: move; touch-action: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui-header">
        <div class="input-group">
            <input type="text" id="noteText" placeholder="寫下點子...">
            <select id="noteColor">
                <option value="#fcf4d9">領域 A(黃)</option>
                <option value="#d9f2e6">領域 B(綠)</option>
                <option value="#fce4ec">主題(紅)</option>
            </select>
        </div>
        <button class="btn-add" onclick="addNote()">➕ 生成</button>
        <button class="btn-del" onclick="reset()">🗑️ 清空</button>
    </div>

    <div id="stage">
        <div id="canvas-box"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-box');
        const stage = document.getElementById('stage');
        let currentScale = 1;

        // --- 全平台自動縮放邏輯 (智慧縮放不變形) ---
        function autoResize() {
            const windowW = window.innerWidth;
            const windowH = window.innerHeight - document.getElementById('ui-header').offsetHeight - 40;
            
            // 計算寬度縮放比與高度縮放比
            const scaleX = windowW / 800;
            const scaleY = windowH / 1100;

            if (windowW > 800) {
                // 電腦版：為了不爆框，取寬與高中較小的那個縮放比，並置中留白
                currentScale = Math.min(scaleX, scaleY) * 0.9;
            } else {
                // 手機版：強制左右滿版 (100% 寬度)，高度則由捲軸上下滑動
                currentScale = scaleX;
            }

            canvas.style.transform = `scale(${currentScale})`;
            
            // 重要：修正 stage 高度，避免下方留白過多或被切斷
            stage.style.height = (1100 * currentScale + 40) + 'px';
        }

        window.addEventListener('resize', autoResize);
        autoResize();

        function addNote() {
            const txt = document.getElementById('noteText').value || "想法";
            const col = document.getElementById('noteColor').value;
            const n = document.createElement('div');
            n.className = 'note';
            n.innerText = txt;
            n.style.backgroundColor = col;
            
            // 預設生成在畫布中心附近
            n.style.left = '355px';
            n.style.top = '400px';

            bindEvents(n);
            canvas.appendChild(n);
            document.getElementById('noteText').value = "";
        }

        function reset() {
            if(confirm("確定清空嗎？")) document.querySelectorAll('.note').forEach(n => n.remove());
        }

        function bindEvents(el) {
            let active = false;
            let startX, startY, initL, initT;

            el.addEventListener('pointerdown', (e) => {
                active = true;
                el.style.zIndex = 1000;
                el.setPointerCapture(e.pointerId);
                
                startX = e.clientX;
                startY = e.clientY;
                initL = el.offsetLeft;
                initT = el.offsetTop;
            });

            el.addEventListener('pointermove', (e) => {
                if (!active) return;
                // 座標修正：位移距離需除以縮放比例
                let dx = (e.clientX - startX) / currentScale;
                let dy = (e.clientY - startY) / currentScale;
                el.style.left = (initL + dx) + 'px';
                el.style.top = (initT + dy) + 'px';
            });

            el.addEventListener('pointerup', (e) => {
                active = false;
                el.style.zIndex = 10;
                el.releasePointerCapture(e.pointerId);
            });
        }
    </script>
</body>
</html>
